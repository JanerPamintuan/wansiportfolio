<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Lab Task 2</title>

<style>
.flex-12a {
  display: flex;
}
.flex-12a .item1 {
  width: 200px;
  background: lightblue;
}
.flex-12a .item2 {
  width: 75px;
  background: pink;
}

.flex-12b {
  display: flex;
}
.flex-12b .item1 {
  width: 50px;
  background: lightblue;
}
.flex-12b .item2 {
  flex: 1;
  background: pink;
}
.flex-12b .item3 {
  width: 75px;
  background: lightblue;
}

.flex-12c {
  display: flex;
  justify-content: space-between;
}
.flex-12c div {
  background: pink;
}

.flex-12d {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 50px;
  border: 1px solid gray;
}
.flex-12d div {
  background: pink;
}

.container {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.main {
  background-color: #95e936; 
  padding: 7px;
  border: 1px solid red;
}

.header,
.footer {
  width: 100%;
  background: beige;
  border: 1px solid red;
}

.header {
  height: 150px;
}

.footer {
  height: 100px;
}

.left-nav {
  flex: 1;
  min-width: 200px;
  min-height: 250px;
  background: rgb(43, 165, 43);
  border: 1px solid red;
  padding: 7px;
}

.right-nav {
  flex: 2;
  min-width: 200px;
  min-height: 100px;
  background: rgb(43, 165, 43);
  border: 1px solid red;
  padding: 7px;
  display: flex;
}

@media (max-width: 800px) {
  .left-nav,
  .right-nav {
    flex: 1 1 100%;
  }
}

@media (max-width: 400px) {
  .container {
    flex-direction: column;
  }

  .left-nav,
  .right-nav {
    width: 100%;
    height: auto;
  }
}

</style>
</head>

<body>

<h2><a href="https://janerpamintuan.github.io/wansiportfolio/" target="_blank">PORTFOLIO</a></h2>
<h3>Finals Task 2. Using CSS Flex Box</h3>

<h3>Part 1</h3>
<h3>12a</h3>
<div class="flex-12a">
  <div class="item1">200px</div>
  <div class="item2">75px</div>
</div>

<h3>12b</h3>
<div class="flex-12b">
  <div class="item1">item1</div>
  <div class="item2">item2</div>
  <div class="item3">item3</div>
</div>

<h3>12c</h3>
<div class="flex-12c">
  <div>item1</div>
  <div>item2</div>
  <div>item3</div>
  <div>item4</div>
</div>

<h3>12d</h3>
<div class="flex-12d">
  <div>item1</div>
  <div>item2</div>
</div>

<h3>Part 2</h3>

<div class="header">This is a header</div>

<div class="main">
  <div class="container">
    <div class="left-nav">Section left-nav</div>
    <div class="right-nav">Section right-nav</div>
  </div>
</div>

<div class="footer">This is a footer</div>

</body>
</html>
